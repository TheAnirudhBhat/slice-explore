<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <!-- `black-translucent` is the only iOS PWA mode that lets page content
       paint THROUGH the status bar (text/icons render in white over whatever
       is below). Needed for FY_D's full-bleed gradient to reach the top edge
       when the proto is added to the home screen. In normal Safari tabs the
       status bar still renders white — accepted PWA-only trade-off. -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#FFFFFF" />
  <!-- `only light` is the spec-correct syntax. With this set, Android Chrome's
       force-dark mode leaves the page alone. -->
  <meta name="color-scheme" content="only light" />
  <meta name="supported-color-schemes" content="light" />
  <title>explore — slice modular iterations</title>
  <!-- Official slice logo, circular-masked. The source slice_icon.png
       is a 512×512 square RGB; favicon.png is the same artwork with
       a circular alpha mask applied so it reads as a disc in browser
       tabs / bookmarks. Apple-touch-icon stays as the square — iOS
       applies its own rounded-rect mask on the home screen. -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/assets/slice_icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600&display=swap" rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
