<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#FFFFFF" />
  <meta name="color-scheme" content="light only" />
  <meta name="supported-color-schemes" content="light" />
  <title>explore — slice modular iterations</title>
  <link rel="icon" type="image/png" href="./assets/slice_icon.png" />
  <link rel="apple-touch-icon" href="./assets/slice_icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/slice_icon.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="./assets/slice_icon.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="./assets/slice_icon.png" />
  <link rel="manifest" href="./manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      color-scheme: light;
    }

    html,
    body,
    #root {
      height: 100%;
      background: #FFFFFF;
    }

    body {
      font-family: 'Rubik', system-ui, sans-serif;
      background: #FFFFFF;
      color: rgba(0, 0, 0, 0.9);
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    .phone-frame {
      position: relative;
      width: 392px;
      height: 812px;
    }

    .phone-shell {
      position: absolute;
      inset: 0;
      border-radius: 62px;
      background: linear-gradient(135deg, #2A2D31 0%, #16181B 45%, #1F2125 100%);
      padding: 6px;
      box-shadow:
        0 40px 80px -30px rgba(0, 0, 0, 0.5),
        0 0 0 0.5px rgba(255, 255, 255, 0.05) inset,
        0 2px 0 rgba(255, 255, 255, 0.08) inset,
        0 -2px 0 rgba(0, 0, 0, 0.5) inset;
    }

    .phone-bezel {
      width: 100%;
      height: 100%;
      border-radius: 56px;
      background: #000;
      padding: 4px;
    }

    .phone-screen {
      width: 372px;
      height: 792px;
      border-radius: 52px;
      overflow: hidden;
      position: relative;
      background: white;
    }

    .dynamic-island {
      position: absolute;
      top: 11px;
      left: 50%;
      transform: translateX(-50%);
      width: 124px;
      height: 35px;
      background: #000;
      border-radius: 20px;
      z-index: 40;
      box-shadow: 0 0 0 0.5px rgba(255, 255, 255, 0.04);
    }

    .btn-left,
    .btn-right {
      position: absolute;
      background: linear-gradient(90deg, #0A0B0D 0%, #2A2D31 50%, #0A0B0D 100%);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
    }

    .btn-left {
      left: -2px;
      width: 3px;
      border-radius: 2px 0 0 2px;
    }

    .btn-right {
      right: -2px;
      width: 3px;
      border-radius: 0 2px 2px 0;
    }

    .btn-action {
      top: 130px;
      height: 32px;
    }

    .btn-vol-up {
      top: 175px;
      height: 56px;
    }

    .btn-vol-dn {
      top: 245px;
      height: 56px;
    }

    .btn-power {
      top: 175px;
      height: 96px;
    }

    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 40px 0 36px;
      z-index: 40;
      pointer-events: none;
    }

    .sb-time {
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
      font-weight: 600;
      font-size: 17px;
      letter-spacing: -0.2px;
      line-height: 1;
      min-width: 70px;
    }

    .sb-right {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: -apple-system, system-ui, sans-serif;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      scrollbar-width: none;
    }

    /* Bars (top app-bar = sticky inside, bottom nav = absolute outside) are visually
       fixed; only the inner content scrolls and bounces elastically at the edges.
       overscroll-behavior:contain keeps the rubber-band local to the phone screen
       so the surrounding page never bounces. */
    .screen-scroll {
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      overscroll-behavior-x: none;
      overflow-x: hidden;
    }

    .tap {
      transition: transform .12s ease, opacity .12s;
    }

    .tap:active {
      transform: scale(0.97);
      opacity: 0.9;
    }


    .debug-panel {
      width: 360px;
      flex-shrink: 0;
      padding: 24px;
      background: white;
      border-radius: 16px;
      border: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow: 0 2px 32px rgba(0, 0, 0, 0.05);
    }

    .var-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .var-row:last-child {
      border-bottom: none;
    }

    .var-pick {
      display: flex;
      gap: 4px;
    }

    .var-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .var-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: white;
      cursor: pointer;
      font-family: 'Rubik';
      font-size: 12px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.7);
      transition: background 100ms, border-color 100ms, color 100ms;
    }

    .var-btn:hover {
      background: #F6F9FC;
    }

    .var-btn.active {
      background: #FAE2FA;
      border-color: #D30AD7;
      color: #D30AD7;
    }

    .preset-tag {
      font-family: 'Rubik';
      font-size: 8px;
      font-weight: 600;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 3px;
      letter-spacing: 0.3px;
    }

    .preset-tag.v0 {
      background: #E0F4E8;
      color: #00A63E;
    }

    .preset-tag.v1 {
      background: #FAE2FA;
      color: #D30AD7;
    }

    .seg-pick {
      display: flex;
      gap: 4px;
      padding: 4px;
      background: #F6F9FC;
      border-radius: 10px;
    }

    .seg-btn {
      flex: 1;
      padding: 6px 10px;
      border: none;
      background: transparent;
      border-radius: 7px;
      cursor: pointer;
      font-family: 'Rubik';
      font-size: 12px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.7);
      transition: background 100ms, color 100ms;
    }

    .seg-btn.active {
      background: white;
      color: #D30AD7;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
    }

    .preset-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: white;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Rubik';
      font-size: 13px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.9);
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 2px;
      transition: background 100ms, border-color 100ms;
    }

    .preset-btn:hover {
      background: #F6F9FC;
    }

    .preset-btn.active {
      background: #FAE2FA;
      border-color: #D30AD7;
    }

    .preset-btn.active .preset-label {
      color: #D30AD7;
    }

    /* ============= MOBILE: app-like fullscreen + slide-in debug drawer ============= */
    .app-stage {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 32px;
      flex-wrap: wrap;
      background: linear-gradient(135deg, #F6F9FC 0%, #EAEBED 100%);
      --bar-overlap: 118px;
    }


    /* When a section's variant is changed, a single subtle pulse draws the eye and settles.
       scroll-margin-top lets scrollIntoView land the section just below the app bar. */
    .section-block {
      position: relative;
    }
    [data-section] {
      scroll-margin-top: calc(var(--bar-overlap, 118px) + 12px);
    }
    .section-block.active {
      animation: section-pulse 700ms ease both;
    }
    @keyframes section-pulse {
      0%, 100% { filter: drop-shadow(0 0 0 transparent); }
      50%      { filter: drop-shadow(0 8px 18px rgba(211, 10, 215, 0.18)); }
    }

    .swipe-up-zone,
    .debug-backdrop {
      display: none;
    }

    @media (max-width: 768px) {
      .app-stage {
        padding: 0;
        gap: 0;
        background: #FFFFFF;
        min-height: 100dvh;
        align-items: stretch;
        justify-content: stretch;
        --bar-overlap: calc(env(safe-area-inset-top, 0px) + 64px);
      }

      .phone-frame {
        width: 100vw !important;
        height: 100vh !important;
        height: 100dvh !important;
      }

      .phone-shell {
        border-radius: 0 !important;
        padding: 0 !important;
        background: #FFFFFF !important;
        box-shadow: none !important;
      }

      .phone-bezel {
        border-radius: 0 !important;
        padding: 0 !important;
        background: #FFFFFF !important;
        overflow: hidden;
      }

      /* App-style proportional scaling: design renders at a logical 392px base width,
         transform-scale stretches it to fit the actual viewport so spacing/typography
         stay perfectly proportional across phone sizes. */
      .phone-screen {
        width: 392px !important;
        height: calc(100dvh / var(--app-scale, 1)) !important;
        border-radius: 0 !important;
        transform: scale(var(--app-scale, 1));
        transform-origin: top left;
      }

      .dynamic-island,
      .btn-left,
      .btn-right,
      .status-bar {
        display: none !important;
      }

      /* Collapse the fake-status-bar buffer on mobile; respect device safe areas. */
      .app-bar-l0 {
        padding-top: env(safe-area-inset-top, 0px) !important;
        height: calc(env(safe-area-inset-top, 0px) + 64px) !important;
      }

      .screen-scroll {
        padding-bottom: calc(120px + var(--sheet-pad, 0px) + env(safe-area-inset-bottom, 0px)) !important;
      }

      /* Edit tab — subtle left-edge handle, low contrast and slim */
      /* Swipe-up zone — invisible band over the bottom nav. An upward drag opens
         the editor drawer. Sits above the safe-area; doesn't catch normal scrolling
         because it's a fixed band, not an overlay over scroll content. */
      .swipe-up-zone {
        display: block;
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: calc(120px + env(safe-area-inset-bottom, 0px));
        z-index: 55;
        touch-action: pan-y;
        background: transparent;
      }
      /* Hint pill is hidden in the dismissed state — swipe is discoverable
         without visual chrome cluttering the nav. */
      .swipe-up-hint { display: none; }

      /* Edit popup — dark editing surface, clearly distinct from the white phone shell above. */
      .debug-drawer {
        position: fixed !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        top: auto !important;
        width: 100vw !important;
        max-width: 100vw !important;
        height: 50dvh;
        max-height: 50dvh;
        z-index: 70;
        border-radius: 20px 20px 0 0 !important;
        transform: translateY(100%);
        transition: transform 280ms cubic-bezier(0.32, 0.72, 0, 1);
        overflow: hidden !important;
        padding: 0 !important;
        box-shadow: 0 -12px 40px rgba(0, 0, 0, 0.25);
        background: #171A1F;
        color: rgba(255, 255, 255, 0.9);
      }
      .drawer-scroll {
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
        padding: 8px 0 max(20px, calc(env(safe-area-inset-bottom, 0px) + 12px));
      }
      .drawer-scroll::-webkit-scrollbar { display: none; }
      .debug-drawer .debug-panel {
        overflow-x: hidden;
      }
      .debug-drawer .var-pick,
      .debug-drawer .seg-pick {
        flex-wrap: wrap;
      }

      /* Grab handle — translucent white on dark */
      .debug-drawer::before {
        background: rgba(255, 255, 255, 0.18) !important;
      }

      /* Force the inner panel to fill the sheet edge-to-edge */
      .debug-drawer .debug-panel {
        width: 100% !important;
        max-width: 100% !important;
        border: none !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        background: transparent !important;
        padding: 8px 16px !important;
      }

      /* Compact dark controls — DLS chip grouping reinterpreted for the dark surface */
      .debug-drawer .var-row {
        padding: 5px 0 !important;
        border-bottom: none !important;
      }
      .debug-drawer .var-btn {
        width: 24px !important;
        height: 24px !important;
        font-size: 11px !important;
        border-radius: 6px !important;
        background: rgba(255, 255, 255, 0.06) !important;
        border-color: transparent !important;
        color: rgba(255, 255, 255, 0.6) !important;
      }
      .debug-drawer .var-btn:hover {
        background: rgba(255, 255, 255, 0.10) !important;
      }
      .debug-drawer .var-btn.active {
        background: rgba(211, 10, 215, 0.20) !important;
        border-color: #DE45E1 !important;
        color: #DE45E1 !important;
      }
      .debug-drawer .var-pick { gap: 4px !important; }

      /* Segmented controls: subtle inset on dark, brand-tinted active */
      .debug-drawer .seg-pick {
        padding: 3px !important;
        gap: 3px !important;
        background: rgba(255, 255, 255, 0.06) !important;
        border: none;
      }
      .debug-drawer .seg-btn {
        padding: 6px 8px !important;
        font-size: 12px !important;
        color: rgba(255, 255, 255, 0.55) !important;
      }
      .debug-drawer .seg-btn.active {
        background: rgba(211, 10, 215, 0.20) !important;
        color: #FFFFFF !important;
        box-shadow: none !important;
      }
      .debug-drawer .preset-tag {
        display: none !important;
      }

      /* Force all panel text to white-alpha — inline T.meta/T.bodySm colors are dark and
         would otherwise be invisible on the dark sheet. Specific overrides below restore
         button/active-state colors. */
      .debug-drawer .debug-panel,
      .debug-drawer .debug-panel * {
        color: rgba(255, 255, 255, 0.9) !important;
      }

      /* Tighten label spacing inside the dark sheet */
      .debug-drawer .debug-panel > div[style*="margin-bottom: 16px"] {
        margin-bottom: 10px !important;
      }
      .debug-drawer .debug-panel > div[style*="margin-bottom: 8px"] {
        margin-bottom: 6px !important;
      }

      /* Hide the "Page composition" header — sheet context makes it redundant */
      .debug-drawer .debug-panel > div:first-child {
        display: none !important;
      }

      /* Meta labels (PRESET, HEADER STYLE, SECTION VARIANTS, Highlight spacing) — dim */
      .debug-drawer .debug-panel div[style*="uppercase"],
      .debug-drawer .debug-panel span[style*="uppercase"] {
        color: rgba(255, 255, 255, 0.5) !important;
        letter-spacing: 0.6px !important;
      }

      /* Variant-row label text */
      .debug-drawer .var-row > div:first-child {
        font-size: 13px !important;
        line-height: 18px !important;
        color: rgba(255, 255, 255, 0.85) !important;
      }

      /* Highlight-spacing toggle separator — white-alpha hairline */
      .debug-drawer .debug-panel > div[style*="border-top"] {
        margin-top: 12px !important;
        padding-top: 12px !important;
        border-top-color: rgba(255, 255, 255, 0.08) !important;
      }

      /* Single divider before SECTION VARIANTS group */
      .debug-drawer .debug-panel > div[style*="margin-bottom: 4px"]:not(:first-of-type) {
        position: relative;
        padding-top: 12px;
        margin-top: 8px !important;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      /* No dimming backdrop on mobile — the phone stays bright so the section being
         edited remains visible and "pops" rather than sitting behind a dark overlay. */
      .debug-backdrop {
        display: none !important;
      }

      .debug-drawer.open {
        transform: translateY(0);
      }

      /* Grab-handle indicator at the top of the popup */
      .debug-drawer::before {
        content: '';
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 40px;
        height: 4px;
        border-radius: 100px;
        background: rgba(255, 255, 255, 0.18);
        z-index: 3;
        pointer-events: none;
      }
      /* Drag handle hit area — covers the top strip so a downward swipe over the
         grab pill dismisses the drawer without interfering with content scroll. */
      .drawer-drag {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 32px;
        z-index: 4;
        cursor: grab;
        touch-action: none;
      }
      .drawer-drag:active { cursor: grabbing; }
      /* Account for the grab handle inside the scroll padding */
      .drawer-scroll { padding-top: 24px !important; }

      /* Liquid-glass close — pinned to the drawer viewport (above the scroll layer),
         frosted translucent fill, hairline edge highlight, soft lift shadow. */
      .drawer-close {
        position: absolute !important;
        top: 20px !important;
        right: 20px !important;
        width: 36px !important;
        height: 36px !important;
        padding: 0 !important;
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        background: rgba(255, 255, 255, 0.14) !important;
        backdrop-filter: blur(24px) saturate(180%) !important;
        -webkit-backdrop-filter: blur(24px) saturate(180%) !important;
        border: 1px solid rgba(255, 255, 255, 0.22) !important;
        border-radius: 100px !important;
        cursor: pointer !important;
        color: #FFFFFF !important;
        box-shadow:
          0 10px 24px rgba(0, 0, 0, 0.35),
          0 1px 2px rgba(0, 0, 0, 0.25),
          inset 0 1px 0 rgba(255, 255, 255, 0.25) !important;
        z-index: 5 !important;
      }
      .drawer-close svg { display: block; }
      .drawer-close svg path { stroke: #FFFFFF !important; }
      .drawer-close:active { opacity: 0.85; transform: scale(0.96); }

      .debug-backdrop {
        display: block;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.3);
        z-index: 65;
        opacity: 0;
        pointer-events: none;
        transition: opacity 240ms ease;
      }

      .debug-backdrop.open {
        opacity: 1;
        pointer-events: auto;
      }

      .drawer-close {
        position: sticky;
        top: 0;
        margin: -8px -8px 16px auto;
        display: flex;
        width: 32px;
        height: 32px;
        align-items: center;
        justify-content: center;
        border: none;
        background: rgba(0, 0, 0, 0.04);
        border-radius: 100px;
        font-size: 18px;
        color: rgba(0, 0, 0, 0.7);
        cursor: pointer;
      }
    }
  </style>

</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    /* ============= TYPOGRAPHY ============= */
    const T = {
      h2: { fontSize: 24, lineHeight: '32px', fontWeight: 500, letterSpacing: '0.48px', color: 'rgba(0,0,0,0.9)' },
      h3: { fontSize: 20, lineHeight: '24px', fontWeight: 500, letterSpacing: '0.40px', color: 'rgba(0,0,0,0.9)' },
      h4: { fontSize: 16, lineHeight: '20px', fontWeight: 500, letterSpacing: '0.32px', color: 'rgba(0,0,0,0.9)' },
      body: { fontSize: 16, lineHeight: '24px', fontWeight: 400, letterSpacing: '0.32px', color: 'rgba(0,0,0,0.9)' },
      bodySm: { fontSize: 14, lineHeight: '20px', fontWeight: 400, letterSpacing: '0.28px', color: 'rgba(0,0,0,0.9)' },
      caption: { fontSize: 12, lineHeight: '16px', fontWeight: 400, letterSpacing: '0.24px', color: 'rgba(0,0,0,0.5)' },
      meta: { fontSize: 10, lineHeight: '12px', fontWeight: 400, letterSpacing: '0.40px', color: 'rgba(0,0,0,0.5)', textTransform: 'uppercase' },
      btnNm: { fontSize: 16, lineHeight: '24px', fontWeight: 500, letterSpacing: '0.32px' },
      btnSm: { fontSize: 14, lineHeight: '20px', fontWeight: 500, letterSpacing: '0.28px' },
      display: { fontSize: 40, lineHeight: '48px', fontWeight: 500, letterSpacing: '-0.4px', color: 'rgba(0,0,0,0.9)' },
    };
    const CARD_SHADOW = '0px 2px 32px 0px rgba(0,0,0,0.05)';
    const CARD_BORDER = '1px solid rgba(0,0,0,0.05)';

    /* ============= CHROME ============= */

    const StatusBar = () => (
      <div className="status-bar" style={{ color: '#000' }}>
        <span className="sb-time">9:41</span>
        <span className="sb-right">
          <svg width="18" height="11" viewBox="0 0 18 11" fill="none">
            <rect x="0" y="7" width="3" height="4" rx="0.8" fill="currentColor" />
            <rect x="4.5" y="5" width="3" height="6" rx="0.8" fill="currentColor" />
            <rect x="9" y="2.5" width="3" height="8.5" rx="0.8" fill="currentColor" />
            <rect x="13.5" y="0" width="3" height="11" rx="0.8" fill="currentColor" />
          </svg>
          <svg width="16" height="13" viewBox="0 -2 16 13" fill="currentColor" style={{ overflow: 'visible' }}>
            <path d="M8 11 5.6 8.6a3.4 3.4 0 0 1 4.8 0L8 11z" />
            <path d="M11.6 6.4 13.4 4.6A7.4 7.4 0 0 0 2.6 4.6l1.8 1.8a4.8 4.8 0 0 1 7.2 0z" />
            <path d="M14.6 3.4 16 2A10.6 10.6 0 0 0 0 2l1.4 1.4a8.6 8.6 0 0 1 13.2 0z" />
          </svg>
          <span style={{ display: 'inline-flex', alignItems: 'center', marginLeft: 2 }}>
            <span style={{
              width: 25, height: 12, position: 'relative',

    /* App bar — transparent at scrollTop=0 when `transparent` prop is set (e.g. FY_A active),

    /* Bar lives outside the scroll container (position: absolute) so iOS rubber-band can't
       move it. The white fill + DLS 'Below' shadow are flipped via ref the moment
       scrollTop > 0 — no React state, no transition, instant. */
    const AppBarL0 = React.forwardRef(({ transparent }, ref) => {
      const fillRef = React.useRef(null);
      const rootRef = React.useRef(null);
      React.useImperativeHandle(ref, () => ({
        setScrolled: (scrolled) => {
          const opaque = scrolled || !transparent;
          if (fillRef.current) fillRef.current.style.opacity = opaque ? '1' : '0';
          if (rootRef.current) rootRef.current.style.boxShadow = scrolled
            ? '0 6px 8px 0 rgba(0,0,0,0.05)' : 'none';
        },
      }), [transparent]);
      const initialOpaque = !transparent;
      return (
        <div ref={rootRef} className="app-bar-l0" style={{
          position: 'absolute', top: 0, left: 0, right: 0, zIndex: 30,
          paddingTop: 54, height: 54 + 64,

    const SectionWrap = ({ title, cta, headerStyle, isFirst, children }) => {

    /* Vertical-roll text — cycles through items every `intervalMs`. Inherits
       font styling from its parent so it can drop into a caption slot. */
    const RollingText = ({ items, intervalMs = 2500, lineHeight = 16 }) => {
      const [idx, setIdx] = useState(0);
      React.useEffect(() => {
        if (items.length < 2) return;
        const t = setInterval(() => setIdx(i => (i + 1) % items.length), intervalMs);
        return () => clearInterval(t);
      }, [items.length, intervalMs]);
      return (
        <span style={{
          display: 'inline-block', height: lineHeight, overflow: 'hidden',
          verticalAlign: 'bottom', whiteSpace: 'nowrap',
        }}>
          <span style={{
            display: 'block',
            transform: `translateY(${-idx * lineHeight}px)`,
            transition: 'transform 500ms cubic-bezier(0.22, 0.61, 0.36, 1)',
          }}>
            {items.map((s, i) => (
              <span key={i} style={{ display: 'block', height: lineHeight, lineHeight: `${lineHeight}px` }}>{s}</span>
            ))}

    /* Like RollingText but hosts arbitrary JSX nodes. Loops in one direction
       only — when the last real item finishes, scroll snaps back to the start
       without animation so the next cycle continues downward. Items are
       right-aligned in the column so narrower items hug the right edge. */
    const RollingStack = ({ items, intervalMs = 2500, height = 24, transitionMs = 800 }) => {
      const [idx, setIdx] = useState(0);
      const [animate, setAnimate] = useState(true);
      React.useEffect(() => {
        if (items.length < 2) return;
        const t = setInterval(() => {
          setAnimate(true);
          setIdx(i => i + 1);
        }, intervalMs);
        return () => clearInterval(t);
      }, [items.length, intervalMs]);
      /* When we land on the cloned first item past the end, wait for the
         transition to complete, then jump (no animation) back to index 0. */
      React.useEffect(() => {
        if (idx >= items.length) {
          const t = setTimeout(() => {
            setAnimate(false);
            setIdx(0);
          }, transitionMs);
          return () => clearTimeout(t);
        }
      }, [idx, items.length, transitionMs]);
      const rendered = items.concat([items[0]]);
      const fade = 'linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%)';
      return (
        <span style={{
          display: 'inline-block', height, overflow: 'hidden',
          verticalAlign: 'bottom',
          maskImage: fade,
          WebkitMaskImage: fade,
        }}>
          <span style={{
            display: 'block',
            transform: `translateY(${-idx * height}px)`,
            transition: animate ? `transform ${transitionMs}ms cubic-bezier(0.4, 0, 0.2, 1)` : 'none',

            {rendered.map((item, i) => (

    /* Shared slide data + colour schemes for all For You carousel variants */

    const FY_SCHEMES = [
      ['#FFE3FE', '#F5C5F8', '#E89DEC'],

      ['#FFE8D0', '#FBD8B0', '#F5C088'],
    ];

    /* Hex → rgb → lerp helpers for continuous gradient interpolation between slide schemes. */
    const _hexToRgb = (h) => {
      const v = h.replace('#', '');
      return [parseInt(v.slice(0,2),16), parseInt(v.slice(2,4),16), parseInt(v.slice(4,6),16)];
    };
    const lerpHex = (a, b, t) => {
      const A = _hexToRgb(a), B = _hexToRgb(b);
      const r = Math.round(A[0] + (B[0]-A[0])*t);
      const g = Math.round(A[1] + (B[1]-A[1])*t);
      const bl= Math.round(A[2] + (B[2]-A[2])*t);
      return `rgb(${r},${g},${bl})`;
    };
    const lerpScheme = (a, b, t) => [lerpHex(a[0], b[0], t), lerpHex(a[1], b[1], t), lerpHex(a[2], b[2], t)];

    /* Infinite carousel — pairs with a slide list rendered as
       [cloneLast, ...slides, cloneFirst]. After the snap settles on either clone,
       scrollLeft is reset (without animation) to the equivalent real slide so the
       loop feels continuous in both directions. */
    const useInfiniteCarousel = (slideCount) => {
      const ref = React.useRef(null);
      const [idx, setIdx] = useState(0);
      const [progress, setProgress] = useState(0);
      const paused = React.useRef(false);
      const teleporting = React.useRef(false);

      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        /* Start on the first real slide (position 1; position 0 is cloneLast). */
        const setInitial = () => {
          const cw = el.offsetWidth;
          if (cw === 0) { requestAnimationFrame(setInitial); return; }
          el.scrollLeft = cw;
        };
        setInitial();
      }, []);

      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        let settleTimer;
        const onScroll = () => {
          const cw = el.offsetWidth;
          if (cw === 0) return;
          const raw = el.scrollLeft / cw; /* 0..N+1 */
          /* Logical position: raw=1 → real slide 0, raw=N → real slide N-1 */
          const logical = raw - 1;
          const wrapped = ((logical % slideCount) + slideCount) % slideCount;
          setProgress(wrapped);
          setIdx(Math.round(wrapped) % slideCount);

          if (teleporting.current) return;
          clearTimeout(settleTimer);
          settleTimer = setTimeout(() => {
            const pos = Math.round(raw);
            if (pos <= 0) {
              /* On cloneLast → jump to real last (position N) without animation */
              teleporting.current = true;
              const prev = el.style.scrollBehavior;
              el.style.scrollBehavior = 'auto';
              el.scrollLeft = cw * slideCount;
              requestAnimationFrame(() => {
                el.style.scrollBehavior = prev;
                teleporting.current = false;
              });
            } else if (pos >= slideCount + 1) {
              /* On cloneFirst → jump back to real first (position 1) */
              teleporting.current = true;
              const prev = el.style.scrollBehavior;
              el.style.scrollBehavior = 'auto';
              el.scrollLeft = cw;
              requestAnimationFrame(() => {
                el.style.scrollBehavior = prev;
                teleporting.current = false;
              });
            }
          }, 140);
        };
        el.addEventListener('scroll', onScroll, { passive: true });
        const onDown = () => { paused.current = true; };
        const onUp = () => { setTimeout(() => { paused.current = false; }, 3000); };
        el.addEventListener('pointerdown', onDown);
        el.addEventListener('pointerup', onUp);
        return () => {
          clearTimeout(settleTimer);
          el.removeEventListener('scroll', onScroll);
          el.removeEventListener('pointerdown', onDown);
          el.removeEventListener('pointerup', onUp);
        };
      }, [slideCount]);

      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const t = setInterval(() => {
          if (paused.current) return;
          const cw = el.offsetWidth;
          if (cw === 0) return;
          el.scrollBy({ left: cw, behavior: 'smooth' });
        }, 4000);
        return () => clearInterval(t);
      }, []);

      return [ref, idx, progress];
    };

    /* Shared autoscroll + index tracking hook for For You carousels.
       Returns [ref, idx, setIdx, progress]. Autoscrolls every 4s with smooth behaviour. */
    const useFYCarousel = (slideCount, slidePct = 100) => {
      const ref = React.useRef(null);
      const [idx, setIdx] = useState(0);
      const [progress, setProgress] = useState(0);
      const touchRef = React.useRef(false);

      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const update = () => {
          const cw = el.offsetWidth;
          const step = cw * (slidePct / 100);
          const ratio = step > 0 ? el.scrollLeft / step : 0;
          setProgress(ratio);
          setIdx(Math.round(ratio));
        };
        update();
        el.addEventListener('scroll', update, { passive: true });
        /* Detect user touch to pause autoscroll temporarily */
        const onDown = () => { touchRef.current = true; };
        const onUp = () => { setTimeout(() => { touchRef.current = false; }, 3000); };
        el.addEventListener('pointerdown', onDown);
        el.addEventListener('pointerup', onUp);
        return () => {
          el.removeEventListener('scroll', update);
          el.removeEventListener('pointerdown', onDown);
          el.removeEventListener('pointerup', onUp);
        };
      }, [slidePct]);

      /* Autoscroll timer */
      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const t = setInterval(() => {
          if (touchRef.current) return;
          const cw = el.offsetWidth;
          const step = cw * (slidePct / 100);
          const nextIdx = (idx + 1) % slideCount;
          el.scrollTo({ left: nextIdx * step, behavior: 'smooth' });
        }, 4000);
        return () => clearInterval(t);
      }, [idx, slideCount, slidePct]);

      return [ref, idx, setIdx, progress];
    };

            <div style={{
              position: 'absolute', bottom: 0, left: 0, right: 0, height: 64,
              background: 'linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 40%, rgba(255,255,255,0.8) 75%, #FFFFFF 100%)',

    /* FY_B — HScroll banner carousel themed with slice DLS palette.

    const FY_B_THEMES = [

      const stepPx = () => {
        const el = ref.current;
        if (!el || !el.firstChild) return el ? el.offsetWidth : 0;
        const gap = parseFloat(getComputedStyle(el).columnGap || getComputedStyle(el).gap) || 0;
        return el.firstChild.offsetWidth + gap;

          setIdx(Math.round(ratio));

        update();
        el.addEventListener('scroll', update, { passive: true });
        return () => el.removeEventListener('scroll', update);
      }, []);

        el.addEventListener('pointerdown', onDown);
        el.addEventListener('pointerup', onUp);

          if (paused) return;
          const step = stepPx();
          const nextIdx = (idx + 1) % cards.length;
          el.scrollTo({ left: nextIdx * step, behavior: 'smooth' });

          el.removeEventListener('pointerdown', onDown);
          el.removeEventListener('pointerup', onUp);

    const useIsMobile = () => {
      const [isMobile, setIsMobile] = useState(
        typeof window !== 'undefined' && window.matchMedia('(max-width: 768px)').matches
      );
      React.useEffect(() => {
        const mq = window.matchMedia('(max-width: 768px)');
        const handler = (e) => setIsMobile(e.matches);
        mq.addEventListener ? mq.addEventListener('change', handler) : mq.addListener(handler);
        return () => {
          mq.removeEventListener ? mq.removeEventListener('change', handler) : mq.removeListener(handler);
        };
      }, []);
      return isMobile;
    };

    /* Computes the proportional scale (viewport_width / 392) and pushes it into a CSS
       variable so the phone-screen can transform-scale to fit any mobile width. */
    const useAppScale = () => {
      React.useEffect(() => {
        const BASE = 392;
        const update = () => {
          const isMobile = window.matchMedia('(max-width: 768px)').matches;
          if (!isMobile) {
            document.documentElement.style.removeProperty('--app-scale');
            return;
          }
          const scale = Math.min(1.3, Math.max(0.75, window.innerWidth / BASE));
          document.documentElement.style.setProperty('--app-scale', String(scale));
        };
        update();
        window.addEventListener('resize', update);
        window.addEventListener('orientationchange', update);
        return () => {
          window.removeEventListener('resize', update);
          window.removeEventListener('orientationchange', update);
        };
      }, []);
    };

    /* After a section's variant changes, scroll the phone to that section so the user
       can immediately see what changed. scrollIntoView works correctly even when the
       phone-screen is transform-scaled on mobile; scroll-margin-top (CSS) handles the
       offset for the fixed app bar. */
    const scrollToSection = (key) => {
      requestAnimationFrame(() => {
        const target = document.querySelector(`[data-section="${key}"]`);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });

    /* Top-of-drawer drag handle. A downward drag dismisses the drawer.
       Threshold: 30px downward travel, <30px horizontal drift. */
    const DrawerDragHandle = ({ onClose }) => {
      const start = React.useRef(null);
      const onTouchStart = (e) => {
        const t = e.touches[0];
        start.current = { x: t.clientX, y: t.clientY, fired: false };
      };
      const onTouchMove = (e) => {
        if (!start.current || start.current.fired) return;
        const t = e.touches[0];
        const dy = t.clientY - start.current.y;
        const dx = Math.abs(t.clientX - start.current.x);
        if (dy > 30 && dx < 30) {
          start.current.fired = true;
          onClose();
        }
      };
      const onTouchEnd = () => { start.current = null; };
      return (
        <div
          className="drawer-drag"
          onTouchStart={onTouchStart}
          onTouchMove={onTouchMove}
          onTouchEnd={onTouchEnd}
          aria-hidden="true" />
      );
    };

    /* Invisible swipe-up zone over the bottom-nav area. On upward drag the editor
       drawer opens. Threshold: 30px upward travel, <30px horizontal drift. */
    const SwipeUpZone = ({ onOpen, disabled }) => {
      const start = React.useRef(null);
      const onTouchStart = (e) => {
        const t = e.touches[0];
        start.current = { x: t.clientX, y: t.clientY, fired: false };
      };
      const onTouchMove = (e) => {
        if (!start.current || start.current.fired) return;
        const t = e.touches[0];
        const dy = start.current.y - t.clientY;
        const dx = Math.abs(t.clientX - start.current.x);
        if (dy > 30 && dx < 30) {
          start.current.fired = true;
          onOpen();
        }
      };
      const onTouchEnd = () => { start.current = null; };
      if (disabled) return null;
      return (
        <div
          className="swipe-up-zone"
          onTouchStart={onTouchStart}
          onTouchMove={onTouchMove}
          onTouchEnd={onTouchEnd}
          aria-hidden="true">
          <div className="swipe-up-hint" />
        </div>
      );
    };

    const App = () => {
      const [useOriginal, setUseOriginal] = useState(false);
      const [sections, setSections] = useState(PRESETS.V1.sections);
      const [headerStyle, setHeaderStyle] = useState(PRESETS.V1.headerStyle);
      const [spacing, setSpacing] = useState({ gapNone: 24, gapHeaderAbove: 32, gapHeaderBelow: 16 });
      const [highlight, setHighlight] = useState(false);
      const [drawerOpen, setDrawerOpen] = useState(false);
      const [separateMore, setSeparateMore] = useState(false);
      const [activeSection, setActiveSection] = useState(null);
      const isMobile = useIsMobile();
      useAppScale();

      const pulseTimer = React.useRef(null);
      const updateSection = (key, v) => {
        setUseOriginal(false);
        setSections(prev => ({ ...prev, [key]: v }));
        /* Clear-then-set so the CSS animation restarts even when the user re-pulses
           the same section. Timer clears the active class after the pulse completes. */
        setActiveSection(null);
        if (pulseTimer.current) clearTimeout(pulseTimer.current);
        requestAnimationFrame(() => {
          setActiveSection(key);
          pulseTimer.current = setTimeout(() => setActiveSection(null), 700);
        });
        scrollToSection(key);
      };
      const updateHeader = (s) => {
        setUseOriginal(false);
        setHeaderStyle(s);
        /* In-card header style means the section title lives inside a card,
           so Bills needs to render the grid in a card (variant B). Section gap
           also tightens to 16 since each section is self-contained. */
        if (s === 'None') {
          setSections(prev => ({ ...prev, bills: 'B' }));
          setSpacing(prev => ({ ...prev, gapNone: 20 }));
        } else {
          setSpacing(prev => ({ ...prev, gapNone: 24 }));
        }
      };
      const updateSpacing = (key, v) => setSpacing(prev => ({ ...prev, [key]: v }));

      const applyPreset = (k) => {
        setSections(PRESETS[k].sections);
        setHeaderStyle(PRESETS[k].headerStyle);
        setUseOriginal(k === 'V0');
      };

      const debugPanel = (
        <DebugPanel
          sections={sections}
          headerStyle={headerStyle}
          useOriginal={useOriginal}
          spacing={spacing}
          highlight={highlight}
          onSectionChange={updateSection}
          onHeaderChange={updateHeader}
          onPresetApply={applyPreset}
          onSpacingChange={updateSpacing}
          onHighlightToggle={() => setHighlight(h => !h)}
          separateMore={separateMore}
          onSeparateMoreToggle={() => setSeparateMore(s => !s)} />
      );

      return (
        <SpacingCtx.Provider value={{ ...spacing, highlight }}>
          <div className="app-stage">
            <div className="phone-frame" style={{ flexShrink: 0 }}>
              <div className="btn-left btn-action" />
              <div className="btn-left btn-vol-up" />
              <div className="btn-left btn-vol-dn" />
              <div className="btn-right btn-power" />
              <div className="phone-shell">
                <div className="phone-bezel">
                  <div className="phone-screen">
                    <div className="dynamic-island" />
                    {useOriginal
                      ? <OriginalExplore />
                      : <ExplorePage sections={sections} headerStyle={headerStyle} activeSection={activeSection} separateMore={separateMore} />}
                  </div>
                </div>
              </div>
            </div>

            {isMobile ? (
              <React.Fragment>
                <div
                  className={'debug-backdrop' + (drawerOpen ? ' open' : '')}
                  onClick={() => setDrawerOpen(false)} />
                <div className={'debug-drawer' + (drawerOpen ? ' open' : '')}>
                  <DrawerDragHandle onClose={() => setDrawerOpen(false)} />
                  <div className="drawer-scroll">
                    {debugPanel}
                  </div>
                  <button className="drawer-close" onClick={() => setDrawerOpen(false)} aria-label="Close editor">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                      <path d="M2.5 2.5 L11.5 11.5 M11.5 2.5 L2.5 11.5" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" />
                    </svg>
                  </button>
                </div>
                <SwipeUpZone onOpen={() => setDrawerOpen(true)} disabled={drawerOpen} />
              </React.Fragment>
            ) : debugPanel}
          </div>
        </SpacingCtx.Provider>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
